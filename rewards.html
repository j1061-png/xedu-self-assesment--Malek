<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progression — Xedu</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=20" />
  <link rel="apple-touch-icon" href="assets/logo.png?v=6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css?v=39" />
  <link rel="stylesheet" href="css/progression.css?v=1" />
</head>
<body class="progression-body">
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="bg-stars" aria-hidden="true"></div>
  <div class="bg-sky" aria-hidden="true">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand-link">
        <img src="assets/logo.png?v=8" alt="Xedu" class="logo" />
        <span class="brand-label"><span class="brand-title">Self Assessment Tool</span></span>
      </a>
      <nav class="nav"><a href="index.html">Home</a><a href="students.html">Students</a><a href="advisors.html">Advisors</a><a href="self-improvement.html">Self Improvement</a><a href="about.html">About</a></nav>
      <div class="header-actions">
        <a href="rewards.html" class="sparx-xp active-xp" aria-label="View progression">
          <span class="sparx-level" aria-hidden="true"><span id="level">1</span></span>
          <span class="sparx-xp-info">
            <span class="sparx-xp-label"><strong id="xp-total">0</strong> XP<span class="sparx-xp-sub" id="xp-progress-text">0 / 1,000 XP</span></span>
            <span class="sparx-xp-bar"><span class="sparx-xp-fill" id="xp-bar"></span></span>
          </span>
        </a>
        <a href="assessment.html" class="btn-nav hide-mobile">Start Assessment</a>
        <button class="menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <main class="progression-page" id="progression-path">
    <div class="prog-stage">
      <div class="prog-hud">
        <div class="prog-hud-badge">
          <span class="prog-hud-star" aria-hidden="true">★</span>
          <div>
            <span class="prog-hud-kicker">Your level</span>
            <strong id="prog-hud-level">1</strong>
          </div>
        </div>
        <div class="prog-hud-track">
          <div class="prog-hud-bar" aria-hidden="true"><div id="prog-hud-fill" class="prog-hud-fill"></div></div>
          <span id="prog-hud-xp" class="prog-hud-xp">0 / 1,000 XP</span>
        </div>
        <a href="assessment.html" class="prog-hud-cta">Earn XP →</a>
      </div>

      <div class="prog-path-shell">
        <button type="button" class="prog-nav prog-nav--prev" id="timeline-prev" aria-label="Previous levels">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>

        <div class="prog-viewport" id="level-timeline-viewport">
          <div class="prog-track" id="level-timeline-track">
            <div class="prog-line" aria-hidden="true">
              <div class="prog-line-bg" id="level-timeline-line-bg"></div>
              <div class="prog-line-fill" id="level-timeline-line-fill"></div>
            </div>
            <div class="prog-nodes" id="level-timeline-nodes"></div>
          </div>
        </div>

        <button type="button" class="prog-nav prog-nav--next" id="timeline-next" aria-label="Next levels">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <p class="prog-swipe-hint">Swipe or use arrows to explore the path</p>
    </div>

    <button type="button" id="timeline-back-to-current" class="prog-jump hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7-6.3-4.6L5.7 21l2.3-7-6-4.6h7.6z"/></svg>
      Jump to Current Level
    </button>

    <div id="prog-tooltip" class="prog-tooltip hidden" role="tooltip"></div>
  </main>

  <script src="js/xp/constants.js?v=42" defer></script>
  <script src="js/xp/calculations.js?v=40" defer></script>
  <script src="js/xp/levels.js?v=40" defer></script>
  <script src="js/xp/history.js?v=40" defer></script>
  <script src="js/xp/storage.js?v=40" defer></script>
  <script src="js/xp/sync.js?v=40" defer></script>
  <script src="js/xp/events.js?v=40" defer></script>
  <script src="js/xp/ui.js?v=40" defer></script>
  <script src="js/xp/timeline.js?v=40" defer></script>
  <script src="js/xp/index.js?v=40" defer></script>
  <script src="js/layout.js?v=24" defer></script>
  <script src="js/rewards.js?v=40" defer></script>
</body>
</html>
